<!doctype html>
<html lang="en">
    <head>
        <title>Home</title>
        <link
            rel="stylesheet"
            href="{{url_for('static', filename='css/home.css')}}"
        />
    </head>
    <body>
        <!--Greetings for person that opened panel-->
        <h1>Welcome to plugin-hub</h1>

        <!--Add more plugin button-->
        <div>
            <a href="{{ url_for('add_plugin') }}">
                <button>Add plugin +</button>
            </a>
        </div>
        <!--List of plugins that are added displayed-->
        {% if plugins %} {% for plugin in plugins %}
        <div>
            <h3>{{ plugin.name }}</h3>
            <p>{{ plugin.description }}</p>
            <a href="url_for('edit_plugin', plugin_id=plugin_id)"
                ><button>Edit</button></a
            >
        </div>
        {% endfor %} {% else %} {% endif %}
    </body>
</html>
